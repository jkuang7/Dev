##### tmux config managed by tmux-codex #####

# Copy mode: vi keys, enter with Ctrl+Shift+Up (or prefix+[)
setw -g mode-keys vi
bind -n C-S-Up copy-mode

# Resize window to smallest active client
# Off: may reduce Shellfish flickering (revert if phone pane sizing breaks)
setw -g aggressive-resize off

# Prevent content rewrapping on terminal resize
set -g wrap-search off

# Sane defaults
set -g history-limit 100000
set -g focus-events on
set -as terminal-features ",xterm-256color:RGB"

# Keep alternate screen enabled (default) to avoid visual residue/artifacting
# when full-screen TUIs repaint.

##### Smart Shellfish vs Desktop mouse toggle (focus + activity) #####

# Desktop default: keep mouse enabled so wheel scrolling works in runner panes.
set -g mouse on

# Ensure tmux receives focus events
set -g focus-events on

# Wheel tuning: keep scrolling in tmux copy-mode to avoid overly-sensitive
# trackpad/wheel behavior inside fullscreen TUIs (like Codex).
unbind -n WheelUpPane
unbind -n WheelDownPane
bind -n WheelUpPane if -F "#{pane_in_mode}" \
  "send-keys -X -N 1 scroll-up" \
  "copy-mode -e \; send-keys -X -N 1 scroll-up"
bind -n WheelDownPane if -F "#{pane_in_mode}" \
  "send-keys -X -N 1 scroll-down" \
  "send-keys -M"
bind -T copy-mode WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane send-keys -X -N 1 scroll-down
bind -T copy-mode-vi WheelUpPane send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 1 scroll-down

# Keyboard scroll fallbacks (works even when wheel events are flaky in some terminals)
bind -n PageUp copy-mode -e \; send-keys -X page-up
bind -n S-PageUp copy-mode -e \; send-keys -X page-up
bind -T copy-mode PageUp send-keys -X page-up
bind -T copy-mode-vi PageUp send-keys -X page-up

# Remove copy-mode search prompt triggers entirely ("search down"/"search up").
# This prevents the bottom search bar from appearing accidentally.
unbind -T copy-mode-vi /
unbind -T copy-mode-vi ?
unbind -T copy-mode-vi :
unbind -T copy-mode-vi f
unbind -T copy-mode-vi F
unbind -T copy-mode-vi t
unbind -T copy-mode-vi T
unbind -T copy-mode-vi ';'
unbind -T copy-mode-vi ','
unbind -T copy-mode-vi n
unbind -T copy-mode-vi N
unbind -T copy-mode C-s
unbind -T copy-mode C-r
unbind -T copy-mode M-f
unbind -T copy-mode M-r
unbind -T copy-mode-vi C-s
unbind -T copy-mode-vi C-r

# Keep copy mode easy to dismiss.
bind -T copy-mode C-c send-keys -X cancel
bind -T copy-mode-vi C-c send-keys -X cancel
bind -T copy-mode q send-keys -X cancel
bind -T copy-mode-vi q send-keys -X cancel
bind -T copy-mode Escape send-keys -X cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# Do not jump back to bottom after mouse-drag copy.
unbind -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

# Detect Shellfish by checking client's shell LC_TERMINAL env var
# Script: $TMUX_CLI_HOME/scripts/tmux-check-shellfish

set-hook -g client-attached \
  'run-shell "/Users/jian/Dev/workspace/tmux-codex/scripts/tmux-check-shellfish \"#{hook_client}\""'

set-hook -g client-focus-in \
  'run-shell "/Users/jian/Dev/workspace/tmux-codex/scripts/tmux-check-shellfish \"#{hook_client}\""'

set-hook -g client-active \
  'run-shell "/Users/jian/Dev/workspace/tmux-codex/scripts/tmux-check-shellfish \"#{hook_client}\""'

# No client-focus-out hook (breaks phone mode while away)

# Manual toggle: prefix + M
bind-key M if -F "#{==:#{mouse},on}" \
  "set -g mouse off \; display-message 'mouse: off'" \
  "set -g mouse on  \; display-message 'mouse: on'"

# Debug: prefix + ?
bind-key ? display-message -p "client_width=#{client_width} mouse=#{mouse}"

# Quick detach: Ctrl+d (returns to shell/clls menu)
# Note: Only works when not in text input mode
bind-key -n C-d detach-client

# Toggle window size freezing: prefix + F
bind-key F if -F "#{window_size}" \
  "setw -u window-size \; display-message 'window resize: enabled'" \
  "setw window-size manual \; display-message 'window resize: frozen'"
